# Linear-SDE dynamics + critic + actor offline training.
# Ablation: exact-bridge posterior mean as the base transition with a learned
# data residual (eps_net reused). 400-epoch run at (spi_tau, alpha) = (10.0, 0.3).

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate

train_epochs: 400
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

batch_size: 1024
horizon: 25
plan_candidates: 1
# Used only when plan_candidates > 1.
plan_noise_scale: 0.01
measure_timing: false
eval_freq: 100
eval_task_ids: "1,2,3,4,5"
eval_episodes_per_task: 50
eval_max_chunks: 200
eval_goal_tol: 0.5
eval_goal_dims: "0,1"

dynamics:
  rollout_loss_weight: 1.0      # default 0.25
  value_geom_sample: false      # default true; uniform-future relabeling
  subgoal_value_alpha: 0.3      # weight on V(ŝ_g, g) in subgoal loss

  # --- Linear dynamics bridge denominator offset ---
  bridge_gamma_inv: 0.0

  # Hard endpoint bridge uses deterministic point subgoals.
  subgoal_distribution: deterministic

  # --- Dynamics parameterization (ablation) ---
  # mu = posterior_mean(x_n, x_0, x_T, n) + scale * sqrt(post_var) * eps_pred
  dynamics_model_type: exact_residual
  exact_residual_scale: 1.0
  exact_residual_bridge_match_weight: 0.0
  exact_residual_reg_weight: 1.0e-4

critic_agent:
  action_chunk_horizon: 10
  discount: 0.99

actor:
  spi_tau: 10.0
  spi_beta: 1.0
  spi_actor_layer_norm: false
