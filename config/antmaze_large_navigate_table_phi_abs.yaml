# Same as antmaze_large_navigate.yaml but goal_rep=phi, target=absolute,
# and dynamics planner_type=forward_bridge_residual.

env_name: antmaze-large-navigate-v0
run_group: antmaze_large_navigate_table_phi_abs
train_epochs: 400
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1

dynamics:
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: deterministic
  subgoal_stochastic_loss: mse
  subgoal_num_samples: 1
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 1.0
  subgoal_goal_representation: phi
  subgoal_target_mode: absolute

critic_agent:
  action_chunk_horizon: 5
  discount: 0.99
  kappa_b: 0.7
  kappa_d: 0.7
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
