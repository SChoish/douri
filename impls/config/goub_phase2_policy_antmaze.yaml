# GOUB Phase-2 policy training on top of frozen GOUB phase1 checkpoints.
# Run: cd impls && python main_goub_phase2_policy.py

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_phase2

train_steps: 1000000
distill_steps: 300000
finetune_steps: 700000
log_interval: 5000
eval_interval: 100000
save_interval: 100000

use_wandb: false
use_tqdm: false

phase1_run_dir: ""
phase1_checkpoint_epoch: -1
idm_checkpoint: ""

agent:
  agent_name: goub_phase2_policy
  rl_algo: iql
  batch_size: 1024
  actor_hidden_dims: [512, 512, 512]
  critic_hidden_dims: [512, 512, 512]
  value_hidden_dims: [512, 512, 512]
  layer_norm: true
  discount: 0.99
  tau: 0.005
  expectile: 0.7
  iql_temperature: 3.0
  td3bc_alpha: 2.5
  td3_policy_delay: 2
  td3_target_policy_noise: 0.2
  td3_target_noise_clip: 0.5
  actor_lr: 0.0003
  critic_lr: 0.0003
  value_lr: 0.0003
  num_action_samples: 16
  action_noise_std: 0.05
  include_mean_action: true
  include_dataset_action: true
  # Stochastic reverse bridge: `sample_plan` noise_scale (try ~1e-2).
  planner_noise_scale: 0.01
  # When planner_noise_scale > 0: number of independent `sample_plan` draws per batch.
  num_planner_samples: 25
  distill_mode: argmax
  distill_beta: 3.0
  distill_loss: mse
  distill_actor_weight: 1.0
  dataset_class: HGCDataset
  subgoal_steps: 25
  value_p_curgoal: 0.2
  value_p_trajgoal: 0.5
  value_p_randomgoal: 0.3
  value_geom_sample: true
  actor_p_curgoal: 0.0
  actor_p_trajgoal: 1.0
  actor_p_randomgoal: 0.0
  actor_geom_sample: false
  gc_negative: true
  p_aug: 0.0
  frame_stack: null
  encoder: null
