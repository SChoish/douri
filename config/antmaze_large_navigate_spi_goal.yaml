# Joint GOUB + critic + SPI actor (global-goal conditioning) — short 200-epoch run.
# Same as config/antmaze_large_navigate.yaml except:
#   - actor.spi_conditioned: goal   (pi and Q are conditioned on the global high_actor_goals
#                                    instead of GOUB predict_subgoal(s, g_global))
#   - train_epochs: 200             (sanity-length sweep)

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate

train_epochs: 200
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

batch_size: 1024
joint_horizon: 25
plan_candidates: 1
# Used only when plan_candidates > 1.
plan_noise_scale: 0.01
measure_timing: false
eval_freq: 100
eval_task_ids: "1,2,3,4,5"
eval_episodes_per_task: 10
eval_max_chunks: 200
eval_goal_tol: 0.5
eval_goal_dims: "0,1"

# Only fields that override defaults from agents/goub_dynamics.get_dynamics_config()
# and agents/critic.get_config(). Everything else uses the agent defaults.
goub:
  rollout_loss_weight: 1.0      # default 0.25
  value_geom_sample: false      # default true; align with DQC-style relabeling
  subgoal_value_alpha: 0.1      # weight on V(s_g, g) in subgoal loss; 0 disables
  bridge_gamma: 1.0e+7
  subgoal_distribution: diag_gaussian
  subgoal_log_std_min: -5.0
  subgoal_log_std_max: 1.0
  subgoal_temperature: 1.0
  subgoal_use_mean_for_actor_goal: true
  subgoal_nll_weight: 1.0
  subgoal_mse_weight: 0.25
  subgoal_var_reg_weight: 0.0001
  subgoal_fr_spi_weight: 0.0
  subgoal_fr_spi_tau: 1.0

critic_agent:
  action_chunk_horizon: 5       # default 10
  discount: 0.99

actor:
  # SPI actor overrides over agents/actor.get_actor_config().
  spi_tau: 5.0
  spi_beta: 1.0
  spi_actor_layer_norm: false
  spi_conditioned: goal         # default 'subgoal'; 'goal' = pi/Q both see global goal
