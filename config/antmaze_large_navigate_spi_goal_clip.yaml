# Joint GOUB + critic + SPI actor — subgoal-conditioned SPI + bridge/subgoal clip-and-pad.
# Enables goub.clip_path_to_goal: true (same rationale as before).
# Actor/Q use per-candidate GOUB subgoals (spi_conditioned: subgoal), not the global goal.

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate

train_epochs: 500
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

batch_size: 1024
joint_horizon: 25
plan_candidates: 1
plan_noise_scale: 0.01
measure_timing: false
eval_freq: 100
eval_task_ids: "1,2,3,4,5"
eval_episodes_per_task: 10
eval_max_chunks: 200
eval_goal_tol: 0.5
eval_goal_dims: "0,1"

goub:
  rollout_loss_weight: 1.0
  value_geom_sample: false
  subgoal_value_alpha: 0.1
  bridge_gamma_inv: 0.0
  subgoal_distribution: deterministic
  # Clip per-row segment endpoint to s_{min(t+K, t_g)} and pad trajectory_segment past
  # t_g with s_{t_g}. Both bridge endpoint and subgoal_net teacher reflect the actual
  # close goal; bridge learns identity at s_g.
  clip_path_to_goal: true

critic_agent:
  action_chunk_horizon: 5
  discount: 0.99

actor:
  spi_tau: 1.0
  spi_beta: 1.0
  spi_actor_layer_norm: false
  spi_conditioned: subgoal
