# antmaze-teleport-navigate-v0, phi recipe, horizon=10, 1000 epochs.
# Same phi recipe as cube_double_phi_u4_gap20_envgoal_h10_1000.yaml;
# critic kappa_b/kappa_d kept at agent defaults (config/antmaze_teleport_navigate.yaml baseline).

env_name: antmaze-teleport-navigate-v0
run_group: antmaze_teleport_navigate_phi_u4_gap20_envgoal_h10_1000
train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 10
plan_candidates: 1
subgoal_filter: false

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 20.0
  subgoal_goal_representation: phi

critic_agent:
  phi_goal_obs_indices: [0, 1]
  action_chunk_horizon: 5
  discount: 0.995
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
