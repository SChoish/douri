# GOUB Phase-1 path-supervised — antmaze (epoch-based)
# Run: cd impls && python main_goub_phase1_path.py
# Requires goub_N == subgoal_steps (see agent.require_matching_horizon).

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate_path

train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

agent:
  batch_size: 1024
  lr: 0.0003
  agent_name: goub_phase1_path
  dataset_class: PathHGCDataset
  path_dynamics: true
  require_matching_horizon: true
  goub_loss_weight: 1.0
  path_loss_weight: 1.0
  rollout_loss_weight: 0.25
  rollout_horizon: 5
  path_loss_slice: null
  rollout_loss_slice: null
  path_eval_slice: [0, 1]
  idm_loss_weight: 1.0
  idm_hidden_dims: [512, 512, 512]
  train_subgoal_estimator: true
  subgoal_loss_weight: 1.0
  subgoal_hidden_dims: [512, 512, 512]
  goub_N: 25
  subgoal_steps: 25
  goub_beta_min: 0.1
  goub_beta_max: 20.0
  goub_lambda: 1.0
  actor_p_curgoal: 0.0
  actor_p_trajgoal: 1.0
  actor_p_randomgoal: 0.0
  actor_geom_sample: false
