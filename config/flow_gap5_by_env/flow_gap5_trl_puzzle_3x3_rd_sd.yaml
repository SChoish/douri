# Plain Flow-BC + TRL baseline, gap=5.0, wmax=5.0, rd_sd
# env=puzzle-3x3-play-v0
env_name: puzzle-3x3-play-v0
run_group: FlowGap5TRL_rd_sd_puzzle_3x3
batch_size: 1024
seed: 0
train_epochs: 600
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 1
plan_noise_scale: 1.0
eval_freq: 100
eval_task_ids: 1,2,3,4,5
eval_episodes_per_task: 10
final_eval_episodes_per_task: 25
eval_max_chunks: 200
eval_video_episodes_per_task: 0
dynamics:
  max_goal_steps_from_env: false
  clip_path_to_goal: true
  subgoal_distribution: flow
  subgoal_stochastic_loss: mse
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.0
  subgoal_goal_representation: phi
  subgoal_target_mode: displacement
  residual_target_mode: displacement
  planner_type: forward_bridge_residual
  forward_bridge_path_loss_horizon: 5
  theta_schedule: prefix_progress
  theta_total: 1.0
  progress_alpha: 0.8
  subgoal_flow_energy_weighted: false
  subgoal_flow_use_value_bonus: false
  subgoal_value_gap_scale: 5.0
  subgoal_value_weight_max: 5.0
  subgoal_flow_steps: 8
  subgoal_flow_t_min: 0.0001
  subgoal_flow_noise_scale: 1.0
  subgoal_temperature: 1.0
  subgoal_eval_selection: best_of_n_value
  subgoal_eval_num_samples: 4
  subgoal_eval_include_zero_candidate: false
  subgoal_eval_seed: 0
  actor_p_curgoal: 0.0
  actor_p_trajgoal: 0.5
  actor_p_randomgoal: 0.5
  actor_geom_sample: true
critic_agent:
  algorithm: trl
  critic_type: trl
  use_chunk_critic: false
  action_chunk_horizon: 5
  full_chunk_horizon: 25
  tau_v: 0.7
  lambda_v_self: 1.0
  lambda_v_base: 1.0
  lambda_v_tri: 1.0
  value_base_horizon: 5
  value_transitive_reweight: true
  lambda_q_local: 1.0
  q_target_from_value: true
  goal_representation: full
  kappa_b: 0.6
  kappa_d: 0.6
  max_goal_steps_from_env: false
  clip_chunk_to_goal: true
  subgoal_value_bonus_type: transitive_product
  subgoal_value_log_eps: 1.0e-06
  subgoal_value_ratio_eps: 0.001
  subgoal_value_ratio_clip: 5.0
  trl_distance_reweight: true
  trl_distance_weight_clip_min: 0.05
  trl_distance_weight_clip_max: 1.0
  trl_distance_weight_mode: inverse_value_offset
  discount: 0.99
  value_distance_weight_power: 0.5
  trl_distance_weight_power: 0.5
actor:
  spi_beta: 1.0
  spi_tau: 5.0
