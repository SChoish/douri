# cube-double-play-v0, phi recipe, diag_gaussian subgoal estimator.
# Same as cube_double_phi_u4_a05_h25_pc4_ha5_kb93_kd80_tau5.yaml but with
# subgoal_value_alpha=0.3 and subgoal_value_gap_scale=50.0.

env_name: cube-double-play-v0
run_group: cube_double_phi_u4_a03_gap50_h25_pc4_ha5_kb93_kd80_tau5
train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100
horizon: 25
plan_candidates: 4
subgoal_filter: false

dynamics:
  max_goal_steps_from_env: true
  clip_path_to_goal: true
  subgoal_distribution: diag_gaussian
  subgoal_stochastic_loss: nll
  subgoal_num_samples: 4
  subgoal_value_alpha: 0.3
  subgoal_value_gap_scale: 50.0
  subgoal_goal_representation: phi

critic_agent:
  action_chunk_horizon: 5
  discount: 0.995
  kappa_b: 0.93
  kappa_d: 0.8
  max_goal_steps_from_env: true
  clip_chunk_to_goal: true
  goal_representation: phi

actor:
  spi_beta: 1.0
  spi_tau: 5.0
