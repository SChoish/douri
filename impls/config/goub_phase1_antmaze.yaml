# GOUB Phase-1 — antmaze-large-navigate-v0 (epoch-based)
# Paths are interpreted relative to the working directory unless absolute.
# Agent overrides merge into ml_collections agent config from agents/goub_phase1.py.

env_name: antmaze-large-navigate-v0
seed: 0
run_group: antmaze_navigate

train_epochs: 1000
log_every_n_epochs: 10
save_every_n_epochs: 100

use_wandb: false
use_tqdm: false

agent:
  batch_size: 1024
  lr: 0.0003
  idm_loss_weight: 1.0
  idm_hidden_dims: [512, 512, 512]
  # Subgoal estimator: (s, high_actor_goals) -> high_actor_targets (MSE).
  train_subgoal_estimator: true
  subgoal_loss_weight: 1.0
  subgoal_hidden_dims: [512, 512, 512]
  goub_N: 25
  subgoal_steps: 25
  goub_beta_min: 0.1
  goub_beta_max: 20.0
  goub_lambda: 1.0
  # Trajectory-only high-level targets (no random subgoals).
  actor_p_curgoal: 0.0
  actor_p_trajgoal: 1.0
  actor_p_randomgoal: 0.0
  actor_geom_sample: false
